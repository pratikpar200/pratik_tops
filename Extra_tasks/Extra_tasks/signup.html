
<html>
<head>
    <title>Sign Up Form</title>
</head>
<body>

    <h2>Sign Up</h2>

    <form action="#" method="post">
        Full Name:<br>
        <input type="text" name="fullname" placeholder="Enter full name" required><br><br>

        Email:<br>
        <input type="email" name="email" placeholder="Enter email" required><br><br>

         phone no:<br>
         <input type="phone number" placeholder="phone number" name="phone number"><br><br>
      
        Username:<br>
        <input type="text" name="username" placeholder="Choose username" required><br><br>

        Password:<br>
        <input type="password" name="password" placeholder="Enter password" required><br><br>

        Confirm Password:<br>
        <input type="password" name="confirm_password" placeholder="Confirm password" required><br><br>

        <input type="submit" value="submit">
    </form>

</body>
</html>
